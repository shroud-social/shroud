syntax = "proto3";

package shroud.v1;

message Channel {
  bytes id = 1;
  bytes parent_id = 2;
  bytes guild_id = 3;
  bytes creator_id = 4;
  int64 creation_time = 5;
  string name = 6;
  bool nsfw = 7;
  int32 slowmode = 8;

  oneof data {
    TextChannel text = 20;
    VoiceChannel voice = 21;
    Forum forum = 22;
    Thread thread = 23;
    Group group = 24;
  }
}

message TextChannel {
  string topic = 1;
}

message VoiceChannel {
  uint32 bitrate = 1;
  uint32 user_limit = 2;
}

message Forum {
  repeated ForumTag tags = 1;
  ForumDefaultLayout layout = 2;
  ForumDefaultOrder order = 3;
}

message Thread {
  bool locked = 1;
}

message Group {
  string image = 1;
}

message ForumTag {
  bytes icon = 1;
  string name = 2;
  bool moderator_only = 3;
}

enum ForumDefaultLayout {
  LIST = 0;
  GRID = 1;
}

enum ForumDefaultOrder {
  ACTIVITY = 0;
  CREATION = 1;
}