syntax = "proto3";

package shroud.v1;

message Credentials {
  bytes user_id = 1;
  string email = 2;
  string password_hash = 3;

  bool mfa_enabled = 10;
  string mfa_secret = 11;
  repeated string mfa_backup_codes = 12;

  bool passkey_enabled = 20;
  repeated bytes credential_id = 21;
  repeated bytes public_key = 22;
  int32 sign_count = 23;
  string attestation_type = 24;
}